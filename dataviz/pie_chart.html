<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.1.0"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-5eb9df98f322f8809d757db689e6ea14"}, "mark": {"type": "arc"}, "encoding": {"color": {"field": "category", "legend": {"title": "Category"}, "type": "nominal"}, "theta": {"field": "share", "type": "quantitative"}, "tooltip": [{"field": "category", "type": "nominal"}, {"field": "share", "type": "quantitative"}]}, "height": 350, "title": "Market Share by Category (%)", "width": 350, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-5eb9df98f322f8809d757db689e6ea14": [{"category": "Alpha", "share": 18.4}, {"category": "Beta", "share": 16.9}, {"category": "Gamma", "share": 15.7}, {"category": "Delta", "share": 14.8}, {"category": "Epsilon", "share": 13.5}, {"category": "Zeta", "share": 12.1}, {"category": "Eta", "share": 8.6}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
